#!/usr/bin/env bash

set -g mode-style "fg=#c9c7cd,bg=#111827"

set -g message-style "fg=#c9c7cd,bg=#111827"
set -g message-command-style "fg=#c9c7cd,bg=#111827"

set -g pane-border-style "fg=#111827"
set -g pane-active-border-style "fg=#c9c7cd"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#111827"

set -g status-bg "#111827"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#ddd6fe,bg=#111827,bold]#[fg=#111827,bg=#ddd6fe,bold] #(whoami) #[fg=#ddd6fe,bg=#111827]"
set -g status-right "#[fg=#ddd6fe,bg=#111827,nobold,nounderscore,noitalics]#[fg=#111827,bg=#ddd6fe,bold] #h #[fg="#ddd6fe",bg="#111827"]"

setw -g window-status-activity-style "underscore,fg=#c9c7cd,bg=#111827"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#111827"
setw -g window-status-format '#[fg=#111827,bg=#111827]#[default]#I #{b:pane_current_path} #[fg=#111827,bg=#111827,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#fca5a5,bg=#111827] #[fg=#111827,bg=#fca5a5] #I #{b:pane_current_path} #[fg=#fca5a5,bg=#111827]'

